<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Making - musing & making</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{
  background:linear-gradient(#ffe4f5,#fff0fa);
  margin:0;
  font-family:'Patrick Hand', cursive;
  color:#6b4f64;
}
#container{
  width:1000px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 220px;
  gap:12px;
  padding:20px;
}
#header{
  grid-column:1/3;
  text-align:center;
  background:#ffe9f7;
  border:3px solid #f7c8e9;
  padding:25px;
  font-size:48px;
  font-family:'Press Start 2P', cursive;
  box-shadow:4px 4px #f3c1e3;
  position: sticky;
  top:0;
  z-index:10;
}
.preview{
  background:#fff6fb;
  border:3px solid #f7c8e9;
  padding:12px;
  margin-bottom:10px;
  box-shadow:4px 4px #f3c1e3;
  border-radius:6px;
}
.sidebar{
  background:#fff0fa;
  border:3px solid #f7c8e9;
  padding:0;
  box-shadow:4px 4px #f3c1e3;
  margin-bottom:12px;
  border-radius:6px;
}
.sidebar-header{
  background:#ffd6ee;
  padding:8px 10px;
  font-family:'Patrick Hand SC', cursive;
  font-weight:bold;
  border-bottom:2px solid #f7c8e9;
}
.sidebar-content{
  padding:10px;
}
.sidebar img{
  width:88px;
  margin:3px;
}
#main-content{
  max-height: calc(100vh - 125px);
  overflow-y:auto;
}
a{
  color:#ff79c6;
  text-decoration:none;
}

/* Global heart bullets for all unordered lists */
ul {
  list-style: none; /* remove default bullets */
  padding-left: 0;  /* optional, remove extra padding */
}

ul li::before {
  content: " ♡";     
  color: black;      
}
</style>
</head>
<body>
<div id="container">

  <div id="header">musing & making</div>

  <!-- MAIN BOX -->
  <div id="main-content">
    <div class="preview">
      <h3>making</h3>
      <p>paintings, crafts, sculpture, anything my hands can create💡</p>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar-wrapper">
    <div class="sidebar">
      <div class="sidebar-header">related links</div>
      <div class="sidebar-content">
        <ul>
        <li><a href="">art account</a></li>
          <li><a href="musing.html">musings</a></li>
          <li><a href="index.html#middle-column">back to main</a></li>
        </ul>
      </div>
    </div>
  </div>

</div>
</body>
</html>
