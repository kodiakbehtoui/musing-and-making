<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gallery - musing & making</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{
  background:linear-gradient(#ffe4f5,#fff0fa);
  margin:0;
  font-family:'Patrick Hand', cursive;
  color:#6b4f64;
}
#container{
  width:1000px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 220px;
  gap:12px;
  padding:20px;
}
#header{
  grid-column:1/3;
  text-align:center;
  background:#ffe9f7;
  border:3px solid #f7c8e9;
  padding:25px;
  font-size:48px;
  font-family:'Press Start 2P', cursive;
  box-shadow:4px 4px #f3c1e3;
  position: sticky;
  top:0;
  z-index:10;
}
.preview{
  background:#fff6fb;
  border:3px solid #f7c8e9;
  padding:12px;
  margin-bottom:10px;
  box-shadow:4px 4px #f3c1e3;
  border-radius:6px;
  text-align:center;
}
#main-content{
  max-height: calc(100vh - 125px);
  overflow-y:auto;
}
.sidebar{
  background:#fff0fa;
  border:3px solid #f7c1e9;
  padding:0;
  box-shadow:4px 4px #f3c1e3;
  margin-bottom:12px;
  border-radius:6px;
}
.sidebar-header{
  background:#ffd6ee;
  padding:8px 10px;
  font-family:'Patrick Hand SC', cursive;
  font-weight:bold;
  border-bottom:2px solid #f7c8e9;
}
.sidebar-content{
  padding:10px;
}
.sidebar img{
  width:88px;
  margin:3px;
}
a{
  color:#ff79c6;
  text-decoration:none;
}

/* gallery images as boxes */
.gallery-box {
  display: inline-block;
  background: #fff6fb;
  border: 3px solid #f7c1e3;
  border-radius: 6px;
  box-shadow: 4px 4px #f3c1e3;
  padding: 5px;
  margin: 5px;
  width: 150px;
  text-align: center;
}
.gallery-box img {
  width: 100%;
  border-radius: 4px;
}

/* Global heart bullets for all unordered lists */
ul {
  list-style: none; /* remove default bullets */
  padding-left: 0;  /* optional, remove extra padding */
}

ul li::before {
  content: " ♡";     
  color: black;      
}
</style>
</head>
<body>

<div id="container">

  <div id="header">musing & making</div>

  <!-- MIDDLE COLUMN -->
  <div id="main-content">
    <div class="gallery-box"><img src="https://placekitten.com/200/200" alt="Kitten 1"><p>Kitten 1</p></div>
    <div class="gallery-box"><img src="https://placekitten.com/201/200" alt="Kitten 2"><p>Kitten 2</p></div>
    <div class="gallery-box"><img src="https://placekitten.com/202/200" alt="Kitten 3"><p>Kitten 3</p></div>
    <div class="gallery-box"><img src="https://placekitten.com/203/200" alt="Kitten 4"><p>Kitten 4</p></div>
    <div class="gallery-box"><img src="https://placekitten.com/204/200" alt="Kitten 5"><p>Kitten 5</p></div>
    <div class="gallery-box"><img src="https://placekitten.com/205/200" alt="Kitten 6"><p>Kitten 6</p></div>
    <!-- Add as many boxes as you want -->
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar-wrapper">
    <div class="sidebar">
      <div class="sidebar-header">related links</div>
      <div class="sidebar-content">
        <ul>
          <li><a href="index.html">home</a></li>
          <li><a href="musing.html">musings</a></li>
          <li><a href="making.html">makings</a></li>
        </ul>
      </div>
    </div>
  </div>

</div>

</body>
</html>
